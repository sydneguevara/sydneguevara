{{ define "title" }}{{ .Title }} · {{ .Site.Title }}{{ end }}

{{ define "content" }}
<section class="container post">
  <article>
    <header>
      <h1>{{ default "Untitled Project" .Title }}</h1>
    </header>

    <div class="post-content">
      {{ with .Params.featuredImage }}
        <img src="{{ . | relURL }}" alt="Featured image"/>
      {{ end }}

      {{ .Content }}
    </div>
  </article>
</section>
{{ end }}
